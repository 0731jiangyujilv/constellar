<rect x="690" y="587" width="285" height="28" class="badge" fill="#6366f1"/><text x="832" y="606" class="chipText" text-anchor="middle">Batch settlement instead of tx-per-payment</text>
<rect x="1260" y="587" width="370" height="28" class="badge" fill="#8b5cf6"/><text x="1445" y="606" class="chipText" text-anchor="middle">Oracle nodes do not need chain transaction keys</text>
<text x="70" y="1264" class="note">Upgrade: old flow = bot signs EIP-3009 → oracle sends transferWithAuthorization on Arc per payment. New flow = bot deposits to Gateway Wallet → GatewayClient.pay(url) → middleware forwards signature → Gateway TEE verifies/accounts/nets → batched chain settlement.</text>
