<text x="70" y="64" class="title">Constellar · Oracle Swarm + Gateway Nanopayments Architecture</text>
<text x="70" y="94" class="subtitle">User channels → webapp → backend workers → x402 HTTP negotiation → Circle Gateway batch settlement → on-chain Arc/EVM state.</text>

