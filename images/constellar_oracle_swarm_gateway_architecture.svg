<g>
  <rect x="85" y="625" width="445" height="112" class="box box-amber"/>
  <text x="107" y="657" class="label">x402 Protocol</text>
  
  <text x="107" y="685" class="small" text-anchor="start">HTTP 402 Payment Required</text>
<text x="107" y="704" class="small" text-anchor="start">EIP-3009 TransferWithAuthorization signature</text>
<text x="107" y="723" class="small" text-anchor="start">X-PAYMENT header sent by GatewayClient.pay(url)</text>

</g>
<g>
  <rect x="85" y="765" width="445" height="112" class="box box-amber"/>
  <text x="107" y="797" class="label">Payment Tiers</text>
  
  <text x="107" y="825" class="small" text-anchor="start">/evidence  = 1000µ</text>
<text x="107" y="844" class="small" text-anchor="start">/summarize = 3000µ</text>
<text x="107" y="863" class="small" text-anchor="start">/verdict   = 5000µ</text>

</g>
<g>
  <rect x="615" y="560" width="535" height="360" class="group "/>
  <text x="639" y="594" class="group-title">Circle Gateway Batch Settlement</text>
  <text x="639" y="616" class="group-sub">Seller submits signatures; Gateway verifies, nets, and batches settlement</text>
</g>
<g>
  <rect x="650" y="625" width="455" height="112" class="box box-indigo"/>
  <text x="672" y="657" class="label">Gateway Wallet Deposit</text>
  
  <text x="672" y="685" class="small" text-anchor="start">Bot deposits USDC once</text>
<text x="672" y="704" class="small" text-anchor="start">Gateway balance funds future oracle calls</text>
<text x="672" y="723" class="small" text-anchor="start">No per-call source-chain transfer tx</text>

</g>
<g>
  <rect x="650" y="765" width="455" height="112" class="box box-indigo"/>
  <text x="672" y="797" class="label">Gateway Facilitator + TEE</text>
  
  <text x="672" y="825" class="small" text-anchor="start">createGatewayMiddleware submits signatures</text>
<text x="672" y="844" class="small" text-anchor="start">AWS Nitro TEE verifies + accounts</text>
<text x="672" y="863" class="small" text-anchor="start">Netting + batch on-chain settlement</text>

</g>
<g>
  <rect x="1190" y="560" width="560" height="360" class="group "/>
